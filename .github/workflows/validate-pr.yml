name: Validate Pull Request Domain Ownership

on:
  pull_request_target: # 👈 Auto-runs when PRs open, even from forks, with secure permissions
    types: [opened, synchronize, reopened]
    paths:
      - 'domains/**'

# 🔐 Grants the script authority to assign labels to your PR dashboard list
permissions:
  pull-requests: write
  contents: read

jobs:
  validate-ownership:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 2 # Fetches current commit and parent for an accurate git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 💡 Removed 'node-cache: npm' because it causes warnings and requires a lockfile

      - name: Install Dependencies
        run: npm install # 👈 Changed from 'npm ci' so your workflow never crashes without a lockfile!

      - name: Process, Validate, and Label Pull Request
        env:
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
          ADMIN_USER: "s8rr"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node -e "
          const { execSync } = require('child_process');
          const path = require('path');
          
          const actor = process.env.PR_ACTOR;
          const admin = process.env.ADMIN_USER;
          const prNum = process.env.PR_NUMBER;
          
          const addLabel = (label) => {
            try { execSync('gh pr edit ' + prNum + ' --add-label \"' + label + '\"'); } catch(e) {}
          };
          const removeLabel = (label) => {
            try { execSync('gh pr edit ' + prNum + ' --remove-label \"' + label + '\"'); } catch(e) {}
          };

          try {
            // Evaluates changes between the PR commit and its target branch parent commit
            const addedFiles = execSync('git diff --name-only --diff-filter=A HEAD^1 HEAD').toString().trim();
            const modifiedFiles = execSync('git diff --name-only --diff-filter=M HEAD^1 HEAD').toString().trim();
            
            if (addedFiles.includes('domains/')) addLabel('type: new-domain');
            if (modifiedFiles.includes('domains/')) addLabel('type: domain-update');

            if (actor === admin) {
              console.log('👑 Admin bypass verified.');
              addLabel('status: valid');
              process.exit(0);
            }

            const changedFiles = execSync('git diff --name-only HEAD^1 HEAD')
              .toString()
              .trim()
              .split('\n')
              .filter(f => f.includes('domains/') && f.endsWith('.json') && !f.endsWith('example.json'));

            if (changedFiles.length === 0) {
              console.log('No domain files modified.');
              process.exit(0);
            }

            changedFiles.forEach(filePath => {
              const fileName = path.basename(filePath);
              const cleanName = fileName.replace('.json', '');
              const parts = cleanName.split('.');
              const fileOwner = parts[parts.length - 1].toLowerCase().trim();

              if (fileOwner !== actor.toLowerCase()) {
                throw new Error('User ' + actor + ' is unauthorized to edit records belonging to ' + fileOwner);
              }
            });

            console.log('✅ Validation successful.');
            removeLabel('status: invalid');
            addLabel('status: valid');
            
          } catch (error) {
            console.error('❌ VALIDATION FAILURE:', error.message);
            removeLabel('status: valid');
            addLabel('status: invalid');
            process.exit(1);
          }
          "
