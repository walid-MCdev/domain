name: Validate Pull Request Domain Ownership

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'domains/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-ownership:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0 

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Process, Verify Ownership, and Label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat << 'EOF' > verify-ownership.js
          const { execSync } = require('child_process');
          const fs = require('fs');

          const prNum = process.env.PR_NUMBER;
          const prAuthor = process.env.PR_AUTHOR;
          const maintainer = 's8rr';

          const addLabel = (label) => { try { execSync(`gh pr edit ${prNum} --add-label "${label}"`); } catch(e) {} };
          const closePR = () => { try { execSync(`gh pr close ${prNum}`); } catch(e) {} };
          const addComment = (message) => { try { execSync(`gh pr comment ${prNum} --body "${message}"`); } catch(e) {} };

          try {
            // 1. Fetch current labels
            const labels = execSync(`gh pr view ${prNum} --json labels --jq '.labels[].name'`).toString().split('\n');

            // 2. Bypass Logic
            if (labels.includes('bypass')) {
                console.log('✅ Bypass label detected. Skipping ownership verification.');
                process.exit(0);
            }

            // 3. Draft Logic
            if (labels.includes('draft')) {
                console.log('⚠️ Draft label detected. Closing PR.');
                addComment(`🚧 **Status: Draft**\n\nThis PR is marked as a draft. Closing until it is ready for review.`);
                closePR();
                process.exit(0);
            }

            // 4. Ownership Verification Logic
            execSync('git fetch origin main');
            const getFiles = (filter) => {
              try {
                return execSync(`git diff --name-only --diff-filter=${filter} origin/main HEAD`)
                  .toString().trim().split('\n').filter(Boolean);
              } catch(e) { return []; }
            };

            const addedFiles = getFiles('A');
            const modifiedFiles = getFiles('M');
            const deletedFiles = getFiles('D');
            const isDomainFile = f => f.includes('domains/') && f.endsWith('.json') && !f.endsWith('example.json');

            const newDomains = addedFiles.filter(isDomainFile);
            const existingDomainsChanged = [...modifiedFiles, ...deletedFiles].filter(isDomainFile);

            if (newDomains.length > 0) addLabel('type: new-domain');
            if (existingDomainsChanged.length > 0) addLabel('type: domain-update');

            let ownershipViolation = false;
            let violatedFile = '';
            let trueOwner = '';

            for (const file of existingDomainsChanged) {
              try {
                const originalContent = execSync(`git show origin/main:${file}`).toString();
                const originalJson = JSON.parse(originalContent);
                if (originalJson.owner && originalJson.owner.toLowerCase() !== prAuthor.toLowerCase()) {
                  ownershipViolation = true;
                  violatedFile = file;
                  trueOwner = originalJson.owner;
                  break; 
                }
              } catch (err) {}
            }

            if (ownershipViolation) {
              console.log(`❌ Security Alert: @${prAuthor} attempted to modify ${violatedFile} owned by @${trueOwner}`);
              addLabel('Rejected');
              const message = `🛑 **Domain Ownership Verification Failed**\n\n` +
                              `Hi @${prAuthor}, you are trying to alter or delete \`${violatedFile}\`, which belongs to @${trueOwner}.\n\n` +
                              `CC: @${maintainer} — unauthorized modification attempt caught. Closing this Pull Request automatically.`;
              addComment(message);
              closePR();
              process.exit(1);
            }

            console.log('✅ Ownership verification passed.');
          } catch (error) {
            console.error('System error:', error.message);
            process.exit(1);
          }
          EOF
          node verify-ownership.js
