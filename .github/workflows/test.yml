name: Core Domain Validator

on:
  pull_request_target:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Get Changed and Deleted Files
        id: files
        # This step uses GitHub CLI to get files changed in this PR 
        # and formats them into JSON arrays for your AVA script.
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          
          # Fetch changed files
          CHANGED=$(gh pr view $PR_NUM --json files --jq '[.files[].path]')
          echo "CHANGED_FILES=$CHANGED" >> $GITHUB_ENV
          
          # Note: For complex deleted files payloads (with historical text data),
          # services like is-a.dev use a specialized companion action step.
          # For a basic setup, passing a JSON string representation works.
          echo "DELETED_FILES=[]" >> $GITHUB_ENV 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Validation Tests
        run: npx ava
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
