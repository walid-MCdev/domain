name: Validate Domain Registry
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4       # 👈 Kept at standard v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install Linting Packages
        run: npm ci

      - name: Run Core Code Validator
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create creds.json for DNSControl Preview
        run: |
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DOMAIN }}

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1 # 👈 Uses the binary installer action

      - name: DNSControl Lint & Preview Simulation
        run: dnscontrol preview           # 👈 Runs the binary directly
