name: Deploy Live Records
on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production Code
        uses: actions/checkout@v4       # 👈 Kept at standard v4

      - name: Create Production Credentials
        run: |
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DOMAIN }}

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1 # 👈 Uses the binary installer action

      - name: Push Records Live to Cloudflare
        run: dnscontrol push              # 👈 Runs the binary directly
