name: Deploy Live Records
on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production Code
        uses: actions/checkout@v4

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder not found in current workspace root.');
            process.exit(1);
          }
          
          const files = fs.readdirSync(domainsDir);
          const result = [];
          
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              const data = JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8'));
              result.push({ subdomain: f.replace('.json', '').toLowerCase(), records: data.records });
            }
          });
          
          const outputPath = path.join(process.cwd(), 'dist-domains.json');
          fs.writeFileSync(outputPath, JSON.stringify(result, null, 2));
          console.log('✅ Compiled ' + result.length + ' domains into ' + outputPath);
          "

      - name: Create Production Credentials
        run: |
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DOMAIN }}

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: Push Records Live to Cloudflare
        run: dnscontrol push
